<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>etourgood Payment</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
:root {
  --primary: #ff7a00;
  --bg: #f6f7f9;
  --card: #ffffff;
  --text: #1f2937;
  --gray: #6b7280;
  --border: #e5e7eb;
}

body {
  margin: 0;
  font-family: -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
}

.container {
  padding: 18px;
  max-width: 420px;
  margin: auto;
}

.header {
  text-align: center;
  margin-bottom: 15px;
}

.logo {
  font-size: 20px;
  font-weight: bold;
  color: var(--primary);
}

.card {
  background: var(--card);
  border-radius: 16px;
  padding: 18px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.05);
  margin-bottom: 15px;
}

.amount {
  font-size: 28px;
  font-weight: bold;
  text-align: center;
  margin-bottom: 5px;
}

.currency {
  text-align: center;
  color: var(--gray);
  margin-bottom: 15px;
}

.row {
  display: flex;
  justify-content: space-between;
  margin-bottom: 10px;
  font-size: 14px;
}

.row span:last-child {
  font-weight: 500;
}

.badge {
  background: #fff3e6;
  color: var(--primary);
  padding: 6px 10px;
  border-radius: 10px;
  font-size: 12px;
}

.btn {
  width: 100%;
  padding: 15px;
  border-radius: 14px;
  border: none;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
}

.btn-primary {
  background: var(--primary);
  color: white;
}

.btn-secondary {
  background: #eee;
  margin-top: 10px;
}

.status {
  text-align: center;
  margin-top: 15px;
  font-weight: bold;
}

.success {
  color: green;
}

.loader {
  display: none;
  text-align: center;
  margin-top: 10px;
}

</style>
</head>

<body>

<div class="container">

  <div class="header">
    <div class="logo">etourgood</div>
  </div>

  <!-- PAYMENT CARD -->
  <div class="card">

    <div class="amount" id="amount">1250.00</div>
    <div class="currency">USDT</div>

    <div class="row">
      <span>Transaction</span>
      <span>#TX983742</span>
    </div>

    <div class="row">
      <span>Type</span>
      <span class="badge">Tour Booking</span>
    </div>

    <div class="row">
      <span>Network</span>
      <span>TRC20</span>
    </div>

    <div class="row">
      <span>Merchant</span>
      <span>etourgood</span>
    </div>

  </div>

  <!-- ACTION -->
  <div class="card">

    <button class="btn btn-primary" onclick="pay()">Pay with Wallet</button>

    <button class="btn btn-secondary">Change Method</button>

    <div class="loader" id="loader">Processing...</div>

    <div class="status" id="status"></div>

  </div>

</div>

<script>

const tg = window.Telegram.WebApp;
tg.expand();

// DYNAMIC DATA (backend'den gelecek)
const transaction = {
  id: "TX983742",
  amount: 1250,
  currency: "USDT",
  type: "Tour Booking"
};

function pay() {

  document.getElementById("loader").style.display = "block";
  document.getElementById("status").innerText = "";

  fetch("https://yourdomain.com/api/pay/", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      transaction_id: transaction.id
    })
  })
  .then(res => res.json())
  .then(data => {

    if (data.status === "pending") {
      document.getElementById("status").innerText = "Waiting for blockchain confirmation...";
    }

    if (data.status === "success") {
      document.getElementById("loader").style.display = "none";
      document.getElementById("status").innerText = "Payment Successful ✅";
      document.getElementById("status").className = "status success";
    }

  });
}

</script>

</body>
</html>
