<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>etourgood Wallet</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
:root {
  --primary: #ff7a00;
  --bg: #f6f7f9;
  --card: #ffffff;
  --text: #1f2937;
  --gray: #6b7280;
}

body {
  margin: 0;
  font-family: -apple-system, sans-serif;
  background: var(--bg);
}

.container {
  padding: 16px;
  max-width: 420px;
  margin: auto;
}

/* HEADER /
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
}

.logo {
  font-weight: bold;
  color: var(--primary);
  font-size: 20px;
}

/ BALANCE /
.balance-card {
  background: linear-gradient(135deg, #ff7a00, #ff9a3c);
  color: white;
  padding: 20px;
  border-radius: 18px;
  margin-bottom: 15px;
}

.balance-title {
  font-size: 13px;
  opacity: 0.8;
}

.balance-amount {
  font-size: 28px;
  font-weight: bold;
  margin-top: 5px;
}

/ ACTIONS /
.actions {
  display: flex;
  gap: 10px;
  margin-top: 15px;
}

.action-btn {
  flex: 1;
  background: rgba(255,255,255,0.2);
  padding: 10px;
  border-radius: 10px;
  text-align: center;
  font-size: 13px;
  cursor: pointer;
}

/ ASSETS /
.card {
  background: var(--card);
  padding: 15px;
  border-radius: 14px;
  margin-bottom: 10px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.04);
}

.asset {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.asset-name {
  font-weight: 500;
}

.asset-balance {
  font-size: 14px;
}

/ BUTTON */
.btn {
  width: 100%;
  padding: 14px;
  background: var(--primary);
  color: white;
  border: none;
  border-radius: 14px;
  font-size: 16px;
  font-weight: bold;
  margin-top: 10px;
  cursor: pointer;
}

</style>
</head>

<body>

<div class="container">

  <!-- HEADER -->
  <div class="header">
    <div class="logo">etourgood</div>
    <div>Wallet</div>
  </div>

  <!-- BALANCE -->
  <div class="balance-card">
    <div class="balance-title">Total Balance</div>
    <div class="balance-amount">$2,450.00</div>

    <div class="actions">
      <div class="action-btn" onclick="deposit()">Deposit</div>
      <div class="action-btn" onclick="send()">Send</div>
      <div class="action-btn" onclick="openPOS()">Pay</div>
    </div>
  </div>

  <!-- ASSETS -->
  <div class="card">
    <div class="asset">
      <div>
        <div class="asset-name">USDT</div>
        <div class="asset-balance">1,200.00</div>
      </div>
      <div>$1,200</div>
    </div>
  </div>

  <div class="card">
    <div class="asset">
      <div>
        <div class="asset-name">TON</div>
        <div class="asset-balance">320.50</div>
      </div>
      <div>$850</div>
    </div>
  </div>

  <!-- BUTTON -->
  <button class="btn" onclick="openPOS()">Pay with Wallet</button>

</div>

<script>

const tg = window.Telegram.WebApp;
tg.expand();

function deposit() {
  alert("Deposit flow (QR / address gelecek)");
}

function send() {
  alert("Send flow (address + amount)");
}

function openPOS() {
  // POS ekranına yönlendirme
  window.location.href = "pos.html"; 
  // veya Telegram bot deep link
}

</script>

</body>
</html>
