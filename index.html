<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>etourgood POS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Telegram WebApp -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    :root {
      --primary: #ff7a00;
      --light: #ffffff;
      --gray: #f4f4f4;
      --dark-gray: #777;
      --text: #222;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--gray);
      color: var(--text);
    }

    .container {
      padding: 20px;
    }

    .header {
      text-align: center;
      margin-bottom: 20px;
    }

    .logo {
      font-size: 22px;
      font-weight: bold;
      color: var(--primary);
    }

    .card {
      background: var(--light);
      border-radius: 14px;
      padding: 16px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
      margin-bottom: 15px;
    }

    .label {
      font-size: 13px;
      color: var(--dark-gray);
      margin-bottom: 5px;
    }

    input, select {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #ddd;
      font-size: 14px;
      margin-bottom: 10px;
    }

    .btn {
      width: 100%;
      padding: 14px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    .btn.secondary {
      background: #eee;
      color: #333;
    }

    .qr {
      text-align: center;
      margin-top: 15px;
    }

    .qr img {
      width: 180px;
      height: 180px;
    }

    .status {
      text-align: center;
      margin-top: 10px;
      font-weight: bold;
    }

    .status.pending {
      color: orange;
    }

    .status.success {
      color: green;
    }

    .wallet {
      font-size: 12px;
      word-break: break-all;
      background: #fafafa;
      padding: 8px;
      border-radius: 8px;
    }
  </style>
</head>

<body>

<div class="container">

  <div class="header">
    <div class="logo">etourgood POS</div>
  </div>

  <div class="card">
    <div class="label">Amount</div>
    <input type="number" id="amount" placeholder="Enter amount">

    <div class="label">Currency</div>
    <select id="currency">
      <option value="USDT">USDT</option>
      <option value="TON">TON</option>
    </select>

    <button class="btn" onclick="createInvoice()">Create Payment</button>
  </div>

  <div class="card" id="invoiceBox" style="display:none;">
    <div class="label">Wallet Address</div>
    <div class="wallet" id="walletAddress"></div>

    <div class="qr">
      <img id="qrImage" src="">
    </div>

    <div class="status pending" id="status">Waiting for payment...</div>

    <button class="btn secondary" onclick="checkPayment()">Check Status</button>
  </div>

</div>

<script>

  const tg = window.Telegram.WebApp;
  tg.expand();

  let currentInvoiceId = null;

  function createInvoice() {
    const amount = document.getElementById("amount").value;
    const currency = document.getElementById("currency").value;

    fetch("https://yourdomain.com/api/create-invoice/", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ amount, currency })
    })
    .then(res => res.json())
    .then(data => {

      currentInvoiceId = data.invoice_id;

      document.getElementById("invoiceBox").style.display = "block";
      document.getElementById("walletAddress").innerText = data.address;
      document.getElementById("qrImage").src = data.qr;

    });
  }

  function checkPayment() {

    fetch(https://yourdomain.com/api/check-invoice/${currentInvoiceId}/)
    .then(res => res.json())
    .then(data => {

      if (data.status === "paid") {
        document.getElementById("status").innerText = "Payment Received ✅";
        document.getElementById("status").className = "status success";
      }

    });
  }

</script>

</body>
</html>
