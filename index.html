<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>etourgood POS</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
:root {
  --primary: #ff7a00;
  --bg: #f6f7f9;
  --card: #ffffff;
  --text: #1f1f1f;
  --sub: #777;
  --border: #e5e5e5;
}

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text);
}

.container {
  padding: 16px;
}

/* HEADER /
.header {
  text-align: center;
  margin-bottom: 16px;
}

.logo {
  font-weight: bold;
  font-size: 20px;
  color: var(--primary);
}

/ CARD /
.card {
  background: var(--card);
  border-radius: 16px;
  padding: 18px;
  box-shadow: 0 6px 16px rgba(0,0,0,0.05);
  margin-bottom: 14px;
}

/ TRANSACTION /
.row {
  display: flex;
  justify-content: space-between;
  margin-bottom: 10px;
}

.label {
  font-size: 13px;
  color: var(--sub);
}

.value {
  font-weight: 500;
}

/ AMOUNT /
.amount {
  font-size: 28px;
  font-weight: bold;
  text-align: center;
  margin: 10px 0;
}

/ PAYMENT METHODS /
.method {
  border: 1px solid var(--border);
  padding: 12px;
  border-radius: 12px;
  margin-bottom: 8px;
  cursor: pointer;
}

.method.active {
  border: 2px solid var(--primary);
}

/ BUTTON /
.btn {
  width: 100%;
  padding: 16px;
  border-radius: 14px;
  border: none;
  background: var(--primary);
  color: white;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
}

/ STATUS /
.status {
  text-align: center;
  margin-top: 15px;
  font-weight: bold;
}

.pending { color: orange; }
.success { color: green; }

/ QR /
.qr {
  text-align: center;
  margin-top: 10px;
}

.qr img {
  width: 180px;
}
</style>
</head>

<body>

<div class="container">

  <div class="header">
    <div class="logo">etourgood POS</div>
  </div>

  <!-- TRANSACTION INFO -->
  <div class="card">
    <div class="row">
      <div class="label">Transaction</div>
      <div class="value" id="txId">#ETG-982134</div>
    </div>

    <div class="row">
      <div class="label">Type</div>
      <div class="value" id="txType">Tour Purchase</div>
    </div>

    <div class="amount" id="amount">250 USDT</div>

    <div class="row">
      <div class="label">Status</div>
      <div class="value pending" id="statusText">Awaiting Payment</div>
    </div>
  </div>

  <!-- PAYMENT METHODS -->
  <div class="card">
    <div class="label">Select Payment Method</div>

    <div class="method active" onclick="selectMethod(this, 'usdt')">
      💰 Pay with USDT
    </div>

    <div class="method" onclick="selectMethod(this, 'card')">
      💳 Credit Card (Soon)
    </div>

    <div class="method" onclick="selectMethod(this, 'transfer')">
      🏦 Bank Transfer (Soon)
    </div>
  </div>

  <!-- ACTION -->
  <div class="card">
    <button class="btn" onclick="pay()">Confirm & Pay</button>

    <div class="qr" id="qrBox" style="display:none;">
      <img id="qrImage" src="">
    </div>

    <div class="status pending" id="paymentStatus"></div>
  </div>

</div>

<script>

const tg = window.Telegram.WebApp;
tg.expand();

let selectedMethod = "usdt";
let txUID = "ETG-982134"; // backend'den gelecek

function selectMethod(el, method) {
  document.querySelectorAll('.method').forEach(m => m.classList.remove('active'));
  el.classList.add('active');
  selectedMethod = method;
}

function pay() {

  if (selectedMethod === "usdt") {

    fetch(https://yourdomain.com/api/pay/${txUID}/, {
      method: "POST"
    })
    .then(res => res.json())
    .then(data => {

      document.getElementById("qrBox").style.display = "block";
      document.getElementById("qrImage").src = data.qr;

      document.getElementById("paymentStatus").innerText = "Waiting for blockchain confirmation...";
    });

  } else {
    alert("This payment method is not active yet.");
  }

}

/ PAYMENT CHECK LOOP */
setInterval(() => {

  fetch(https://yourdomain.com/api/status/${txUID}/)
  .then(res => res.json())
  .then(data => {

    if (data.status === "paid") {
      document.getElementById("statusText").innerText = "Paid";
      document.getElementById("statusText").className = "value success";

      document.getElementById("paymentStatus").innerText = "Payment Confirmed ✅";
      document.getElementById("paymentStatus").className = "status success";
    }

  });

}, 5000);

</script>

</body>
</html>
